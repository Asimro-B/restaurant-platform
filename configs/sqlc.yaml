version: "2"

sql:
  - schema:
      - "../database/schema"
    queries: "../database/sqlc/queries"
    engine: "postgresql"

    gen:
      go:
        package: "db"
        out: "../database/sqlc/gen"
        sql_package: "pgx/v5"

        overrides:
          - db_type: "pg_catalog.numeric"
            go_type: "github.com/shopspring/decimal.Decimal"
            nullable: false

          - db_type: "pg_catalog.numeric"
            go_type: "github.com/shopspring/decimal.NullDecimal"
            nullable: true

          - db_type: "pg_catalog.interval"
            go_type: "string"
            nullable: true

          - db_type: "inet"
            go_type: "net/netip.Prefix"